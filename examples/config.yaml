schedule: "0 * * * *"

# Optionally report the status of each backup run to an HTTP-based cron
# monitoring service (such as Sentry Crons or healthchecks.io). Each URL is
# fetched with a simple HTTP GET request when the corresponding state is
# reached, and any state you leave out is simply not reported.
monitor:
  start: https://sentry.io/api/0/organizations/your-org/monitors/github-backup/checkins/?status=in_progress
  success: https://sentry.io/api/0/organizations/your-org/monitors/github-backup/checkins/?status=ok
  failure: https://sentry.io/api/0/organizations/your-org/monitors/github-backup/checkins/?status=error

backups:
  # Backup all the repositories that the provided credentials have access to
  - kind: github/repo
    from: user
    to: /backup/github
    credentials: !Token your_access_token

  # Backup the repository from "notheotherben" called "nix-env"
  - kind: github/repo
    from: users/notheotherben
    to: /backup/github
    filter: repo.name == "nix-env"

  # Backup public, non-forked, repositories called "git-tool" or "grey" from the "SierraSoftworks" organization
  - kind: github/repo
    from: orgs/SierraSoftworks
    to: /backup/github
    filter: repo.public && !repo.fork && repo.name in ["git-tool", "grey"]

  # Backup production non-source releases from the "SierraSoftworks" organization
  - kind: github/release
    from: orgs/SierraSoftworks
    to: /backup/github
    filter: repo.public && !release.prerelease && !artifact.source-code

  # Backup all repositories that the user `notheotherben` has starred
  - kind: github/repo
    from: starred
    to: /backup/github

  - kind: github/repo
    from: repos/SierraSoftworks/github-backup
    to: /backup/github

  - kind: github/release
    from: repos/SierraSoftworks/github-backup
    to: /backup/github-releases
    filter: '!release.prerelease'

  # Backup repos and release artifacts to Forgejo
  - kind: github/repo
    from: repos/SierraSoftworks/github-backup
    to:
      kind: forgejo/repo
      address: https://forgejo.example.com
      owner: backups
      credentials: !Token forgejo_access_token

  - kind: github/release
    from: repos/SierraSoftworks/github-backup
    to:
      kind: forgejo/release
      address: https://forgejo.example.com
      owner: backups
      credentials: !Token forgejo_access_token
    filter: '!release.prerelease'


  # Backup repos to the local filesystem and Forgejo simultaneously
  - kind: github/repo
    from: repos/SierraSoftworks/github-backup
    to:
      - /backup/github
      - kind: forgejo/repo
        address: https://forgejo.example.com
        owner: backups
        credentials: !Token forgejo_access_token
